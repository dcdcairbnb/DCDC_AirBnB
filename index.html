<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Airbnb Properties | Nashville & Colorado</title>
<meta name="description" content="Two premium Airbnb properties. Music City Retreat in Nashville, TN and River West 522 in Silverthorne, CO. Both sleep 6, rated 4.8+ stars.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: #1a1a2e; line-height: 1.6; }
  .hero { position: relative; height: 85vh; min-height: 500px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; align-items: center; justify-content: center; text-align: center; color: white; overflow: hidden; }
  .hero-content { position: relative; z-index: 1; max-width: 750px; padding: 0 24px; }
  .hero h1 { font-size: 3rem; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
  .hero .subtitle { font-size: 1.2rem; opacity: 0.85; margin-bottom: 36px; }
  .cta-button { display: inline-block; background: #e94560; color: white; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-size: 1rem; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
  .cta-button.secondary { background: transparent; border: 2px solid white; }
  .cta-button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(233,69,96,0.4); }
  .property-picker { background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .picker-inner { max-width: 1000px; margin: 0 auto; display: flex; gap: 0; }
  .picker-tab { flex: 1; padding: 18px 24px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 600; font-size: 1rem; color: #666; text-decoration: none; transition: all 0.2s; }
  .picker-tab.nashville { border-bottom-color: #e94560; color: #1a1a2e; }
  .picker-tab.colorado { border-bottom-color: #2d6a4f; color: #1a1a2e; }
  #distance-banner { position: fixed; top: 0; left: 0; right: 0; width: 100%; z-index: 101; }
  @media (max-width: 768px) { .hero h1 { font-size: 2rem; } }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-content">
    <h1>Two Properties. Two Destinations.</h1>
    <p class="subtitle">Nashville, Tennessee · Silverthorne, Colorado<br>Both sleep 6. Both rated 4.8+ stars on Airbnb.</p>
    <div class="hero-buttons">
      <a href="https://airbnb.com/h/nashvillemusiccitystay" class="cta-button">View Nashville Property</a>
      <a href="https://www.airbnb.com/rooms/920827114586721400" class="cta-button" style="background: #0ea5e9;">View Colorado Property</a>
    </div>
  </div>
</div>

<div id="distance-banner" style="background-color: red; color: white; text-align: center; padding: 15px 24px; font-size: 1rem; font-weight: 600; display: none;"></div>

<script>
(function() {
  function toRad(deg) { return deg * Math.PI / 180; }
  function distanceMiles(lat1, lon1, lat2, lon2) {
    var R = 3958.8;
    var dLat = toRad(lat2 - lat1);
    var dLon = toRad(lon2 - lon1);
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function getLocationName(lat, lon) {
    return fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lon)
      .then(function(response) { return response.json(); })
      .then(function(data) {
        var city = data.address.city || data.address.town || data.address.village || 'Unknown';
        var state = data.address.state || '';
        var country = data.address.country || '';
        return city + (state ? ', ' + state : '') + (country ? ', ' + country : '');
      })
      .catch(function() { return 'Your Location'; });
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      var nashLat = 36.1627, nashLon = -86.7816;
      var coLat = 39.6328, coLon = -106.0662;
      var dNash = Math.round(distanceMiles(lat, lon, nashLat, nashLon));
      var dCo = Math.round(distanceMiles(lat, lon, coLat, coLon));
      var banner = document.getElementById('distance-banner');

      getLocationName(lat, lon).then(function(location) {
        banner.innerHTML = '🎵 <strong>' + location + '</strong> · <strong>' + dNash + ' mi</strong> to Nashville · <strong>' + dCo + ' mi</strong> to Colorado';
        banner.style.display = 'block';
        setTimeout(function() { banner.style.display = 'none'; }, 20000);

        var now = new Date();
        var date = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        var time = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') + ':' + String(now.getSeconds()).padStart(2, '0');
        var parts = location.split(', ');
        var city = parts[0] || 'Unknown';
        var state = parts[1] || 'Unknown';
        var country = parts[2] || 'Unknown';

        var geoData = { date: date, time: time, city: city, state: state, country: country, distance_to_nashville: dNash, distance_to_colorado: dCo };
        localStorage.setItem('geo_' + date + '_' + time.replace(/:/g, '-'), JSON.stringify(geoData));

        fetch('http://localhost:5000/log-geolocation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(geoData)
        }).catch(function() {});
      });
    }, function() {}, { timeout: 5000 });
  }
})();
</script>

</body>
</html>
